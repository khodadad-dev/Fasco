<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp</title>
    <link rel="Icon" href="../img/icon/icon.png">
    <link
      href="https://fonts.googleapis.com/css2?family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/Respansive.css">
  </head>
  <body>
    <section class="box-sign-Up">
      <div class="SignUp">
        <div class="picture"></div>
        <div class="list-Sign-Up">
          <div class="text-list-Up">
            <div class="text-Up">
              <h3>FASCO</h3>
                <p>Create Account</p>
            </div>
            <!-- /////////// -->
             <div class="sign-By-Up">
                <a class="Bt-Sign-Up" href=""><span><img src="../img/picture/login/icon/Email.png" alt="">Sign up with Google</span></a>
                <a class="Bt-Sign-Up" href=""><span><img src="../img/picture/login/icon/Email.png" alt="">Sign up with Email</span></a>
             </div>
             <!-- ////////// -->
              <div class="text-Or-Up">-OR-</div>
              <!-- ///////// -->
              <div class="input-text-Up">
                        <input  class="type-Up" type="text" placeholder="FirstName" name="Name">
                        <input  class="type-Up" type="text" placeholder="LastName" name="Lname">    
                        <input  class="type-Up" type="email" placeholder="Email Address" name="Email">    
                        <input  class="type-Up" type="tel" placeholder="Phone Number" name="Phone Number" >    
                        <input  class="type-Up" type="password" placeholder="Password" name="Password">    
                        <input  class="type-Up" type="password" placeholder="Confirm Password" name="Confirm Password">    
              </div>
              <!-- ////////// -->
              <div class="input-button-Up">
                 <a class="Bt-send-Up" href="">Create Account</a>
                 <div class="txt-frogetpass-Up">
                   <span>Already have an account?</span><a href="signin.html">Login</a>
                 </div>
              </div>
              <!-- ////////// -->

          </div>
        </div> 
      </div>
    </section>
  </body>
  <script src="../js/style.js"></script>
</html>
