<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>
    <link rel="Icon" href="/img/icon/icon.png">
    <link
      href="https://fonts.googleapis.com/css2?family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Volkhov:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/Respansive.css">
    
</head>
<body>
    <section class="box-sign-in">
        <div class="SignIn">
            <div class="picture"></div>
            <div class="list-Sign-In">
                <form class="text-list">
                    <div class="text">
                        <h3>FASCO</h3>
                        <p>Sign In To FASCO</p>
                    </div>
                    <!-- ///////// -->
                    <div class="sign-By">
                       <a class="Bt-Sign" href=""><span><img src="/img/Picture/Login/icon/Google.png" alt="">Sign up with Google</span></a>
                       <a class="Bt-Sign" href=""><span><img src="/img/Picture/Login/icon/Email.png" alt="">Sign up with Email</span></a>
                    </div>
                    <!-- //////// -->
                    <div class="text-Or">-OR-</div>
                    <!-- //////// -->
                    <div class="input-text">
                        <input class="type-In" type="text" placeholder="Email" name="Email">
                        <input class="type-In" type="password" placeholder="Password" name="Password">    
                    </div>
                    <!-- ////////-->
                    <div class="input-button">
                         <a class="Bt-send" href="">Sign In</a>
                         <a class="Bt-Rigister" href="SignUp.html">Register Now</a>
                         <div class="txt-frogetpass">
                            <a href="">Forget Password?</a>
                         </div>
                    </div>
                    <!-- ////////-->
                </form>
            </div>
        </div>
    </section>
</body>
<script src="/js/style.js"></script>
</html>
